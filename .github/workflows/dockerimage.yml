name: Docker Image CI
on:
  push:
    branches:
      - master
      - release-*
      - demo-*
      - rc-*
      - rfc-*
    tags: '*'

env:
  REGISTRY_IMAGE: cbioportal/cbioportal

jobs:
  # ---------------------------------------------------------------------------
  # web-and-data image
  #
  # Each architecture builds on its own native runner and is pushed to the
  # registry by digest; the merge job below assembles the multi-arch manifest
  # list. amd64 and arm64 build in parallel.
  # See: https://docs.docker.com/build/ci/github-actions/multi-platform/
  # ---------------------------------------------------------------------------
  build_web_and_data:
    if: github.repository == 'cBioPortal/cbioportal'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
      - name: Prepare platform pair
        env:
          platform: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web-and-data/Dockerfile
          platforms: ${{ matrix.platform }}
          # Per-image, per-arch cache scope so the four builds don't evict each
          # other's GitHub Actions cache. mode=max caches intermediate layers too.
          cache-from: type=gha,scope=webdata-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=webdata-${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-webdata-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  build_and_publish_web_and_data:
    if: github.repository == 'cBioPortal/cbioportal'
    runs-on: ubuntu-latest
    needs:
      - build_web_and_data
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-webdata-*
          merge-multiple: true
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          # The latest tag will also be generated on tag event with a valid semver tag
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046  # intentional: split tag flags and digests into separate args
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)
      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}

  # ---------------------------------------------------------------------------
  # web (web-shenandoah) image -- same native multi-arch pattern as above.
  # ---------------------------------------------------------------------------
  build_web:
    if: github.repository == 'cBioPortal/cbioportal'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
      - name: Prepare platform pair
        env:
          platform: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web/Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=webonly-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=webonly-${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-webonly-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  build_and_publish_web:
    if: github.repository == 'cBioPortal/cbioportal'
    runs-on: ubuntu-latest
    needs:
      - build_web
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-webonly-*
          merge-multiple: true
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          # Do not generate latest tag
          flavor: |
            latest=false
            suffix=-web-shenandoah
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046  # intentional: split tag flags and digests into separate args
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)
      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}

  update_dependency_graph:
      needs: build_and_publish_web
      if: github.repository == 'cBioPortal/cbioportal' && github.ref == 'refs/heads/master'
      runs-on: ubuntu-latest
      steps:
        - name: Extract metadata
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: |
              cbioportal/cbioportal
            # Do not generate latest tag
            flavor: |
              latest=false
              suffix=-web-shenandoah
            tags: |
              type=ref,event=branch
              type=semver,pattern={{version}}

        - name: Update Github Dependency Graph
          uses: anchore/sbom-action@v0
          with:
            image: ${{ steps.meta.outputs.tags }}
            dependency-snapshot: 'true'
            github-token: '${{ secrets.GITHUB_TOKEN }}'

  update_master_k8s_deployment:
    needs: build_and_publish_web
    if: github.repository == 'cBioPortal/cbioportal' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_FILE_PATH: "argocd/aws/203403084713/clusters/cbioportal-prod/apps/cbioportal"
      DEPLOYMENT_FILE_NAMES: "cbioportal_backend_master_blue.yaml cbioportal_backend_master_green.yaml"
      K8S_REPO: 'knowledgesystems/knowledgesystems-k8s-deployment'
      ARGOCD_CLI_VER: '2.13.3'
      ARGOCD_SERVER: 'argocd.cbioportal.org'
      ARGOCD_APP: 'cbioportal'
      ARGOCD_RESOURCE_OPTIONS: '--resource apps:Deployment:default/cbioportal-backend-master-blue --resource apps:Deployment:default/cbioportal-backend-master-green'
    steps:
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            cbioportal/cbioportal
          # Do not generate latest tag
          flavor: |
            latest=false
            suffix=-web-shenandoah
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Extract Image Tag
        run: |
          DOCKER_TAG=${{ steps.meta.outputs.tags }}
          docker pull $DOCKER_TAG
          DOCKER_SHA=$(docker inspect --format="{{index .RepoDigests 0}}" $DOCKER_TAG)
          echo "DOCKER_SHA=$DOCKER_SHA" >> $GITHUB_ENV

      - name: Checkout K8s Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.K8S_REPO }}
          token: ${{ secrets.K8S_REPO_TOKEN }}

      - name: Update Master Deployment File
        run: |
          for FILE in $DEPLOYMENT_FILE_NAMES; do
            sed -i "s|image:.*|image: $DOCKER_SHA|" $DEPLOYMENT_FILE_PATH/$FILE
          done

      - name: Add and commit changes to deployment file
        run: |
          git config --global user.email "cBioPortal-Action@github.com"
          git config --global user.name "cBioPortal Backend Github Action"
          if ! git diff --quiet; then
            git add -A
            git commit -m "Update master deployment"
          else
            echo "No changes to commit."
          fi

      - name: Push changes to K8s repo
        uses: ad-m/github-push-action@master
        with:
          github_token: '${{ secrets.K8S_REPO_TOKEN }}'
          repository: ${{ env.K8S_REPO }}
          branch: master

      - name: Setup ArgoCD
        uses: clowdhaus/argo-cd-action/@main
        with:
          version: ${{ env.ARGOCD_CLI_VER }}
          command: login ${{ env.ARGOCD_SERVER }}
          options: --username ${{ secrets.ARGOCD_2034_USERNAME }} --password ${{ secrets.ARGOCD_2034_PASSWORD }}

      - name: Sync master deployment
        uses: clowdhaus/argo-cd-action/@main
        with:
          version: ${{ env.ARGOCD_CLI_VER }}
          command: app sync ${{ env.ARGOCD_APP }}
          options: ${{ env.ARGOCD_RESOURCE_OPTIONS }}
