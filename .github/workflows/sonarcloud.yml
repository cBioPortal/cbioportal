name: sonarcloud
on:
  push:
    branches:
      - master
      - maintenance-v6
  # workflow_run is triggered when sonarcloud-pr-build completes.
  # Unlike pull_request, workflow_run always runs in the base repo context and
  # has access to secrets — including from fork PRs — without exposing them to
  # untrusted code (the workflow file itself comes from the base branch).
  workflow_run:
    workflows: ["sonarcloud-pr-build"]
    types:
      - completed

jobs:
  build:
    name: sonarcloud
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download PR info
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: pr-info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: pr-info/

      - name: Read PR info
        if: github.event_name == 'workflow_run'
        id: pr-info
        run: |
          echo "number=$(cat pr-info/pr-number.txt)" >> $GITHUB_OUTPUT
          echo "head-ref=$(cat pr-info/pr-head-ref.txt)" >> $GITHUB_OUTPUT
          echo "base-ref=$(cat pr-info/pr-base-ref.txt)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v2
        if: github.event_name == 'push'
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - uses: actions/checkout@v2
        if: github.event_name == 'workflow_run'
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v1
        with:
          java-version: 21
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: 'Create application.properties'
        run: |
          cp src/main/resources/application.properties.EXAMPLE src/main/resources/application.properties
      - name: 'Add host.testcontainers.internal to /etc/hosts'
        run: |
            echo "127.0.0.1 host.testcontainers.internal" | sudo tee -a /etc/hosts
      - name: Build, collect coverage and analyze (push)
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
      - name: Build, collect coverage and analyze (pull request)
        if: github.event_name == 'workflow_run'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.pullrequest.key=${{ steps.pr-info.outputs.number }} \
            -Dsonar.pullrequest.branch=${{ steps.pr-info.outputs.head-ref }} \
            -Dsonar.pullrequest.base=${{ steps.pr-info.outputs.base-ref }} \
            -Dsonar.scm.revision=${{ github.event.workflow_run.head_sha }}
